<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boutique E-commerce Pro</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial,sans-serif;
background:#0b1220;
color:white;
}

header{
position:sticky;
top:0;
background:#0a0f1a;
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
z-index:1000;
border-bottom:1px solid #1f2a44;
}

.menu-btn{font-size:22px;cursor:pointer;}
#time{font-size:13px;opacity:0.9;}

.section{padding:15px;}

.carousel{
display:flex;
overflow-x:auto;
gap:12px;
}

/* 🔥 CARTE FIXE */
.card{
min-width:180px;
max-width:180px;
background:#121a2b;
border-radius:10px;
overflow:hidden;
display:flex;
flex-direction:column;
}

/* 🔥 CONTENEUR IMAGE FIXE */
.img-box{
width:100%;
height:160px;
background:#0b1220;
display:flex;
align-items:center;
justify-content:center;
}

.img-box img{
max-width:100%;
max-height:100%;
object-fit:contain;
display:block;
}

.card-content{padding:8px;}

.title{font-size:13px;font-weight:bold;}
.desc{font-size:11px;opacity:0.85;margin:4px 0;}
.price{color:#22c55e;font-weight:bold;font-size:13px;}

/* 🔽 boutons petits */
button{
width:100%;
padding:4px;
font-size:10px;
margin-top:4px;
border:none;
border-radius:4px;
cursor:pointer;
}

.download{background:#3b82f6;color:white;}
.wa{background:#25D366;color:white;}

</style>
</head>

<body>

<header>
<div class="menu-btn">☰</div>
<div>BOUTIQUE PRO</div>
<div id="time"></div>
</header>

<!-- ================= PREMIUM ================= -->
<div class="section">
<h2>💎 Premium</h2>
<div class="carousel">

<div class="card">
<div class="img-box">
<img src="https://raw.githubusercontent.com/Lfg237/image-retouche-photo-portrait-/main/portrait_233%20(23)_202604302106_1.jpg">
</div>
<div class="card-content">
<div class="title">Portrait 23</div>
<div class="desc">JPEG 1000 FCFA / Grand format 10000 FCFA</div>
<div class="price">1000 FCFA</div>
<button class="download" onclick="downloadImg(23,'https://raw.githubusercontent.com/Lfg237/image-retouche-photo-portrait-/main/portrait_233%20(23)_202604302106_1.jpg')">Télécharger</button>
<button class="wa" onclick="whatsapp(23)">WhatsApp</button>
</div>
</div>

<div class="card">
<div class="img-box">
<img src="https://raw.githubusercontent.com/Lfg237/image-retouche-photo-portrait-/main/portrait_233%20(24)_202604302107_1.jpg">
</div>
<div class="card-content">
<div class="title">Portrait 24</div>
<div class="desc">JPEG 1000 FCFA / Grand format 10000 FCFA</div>
<div class="price">1000 FCFA</div>
<button class="download" onclick="downloadImg(24,'https://raw.githubusercontent.com/Lfg237/image-retouche-photo-portrait-/main/portrait_233%20(24)_202604302107_1.jpg')">Télécharger</button>
<button class="wa" onclick="whatsapp(24)">WhatsApp</button>
</div>
</div>

</div>
</div>

<!-- ================= PROMO ================= -->
<div class="section">
<h2>🔥 Promo</h2>
<div class="carousel">

<div class="card">
<div class="img-box">
<img src="https://raw.githubusercontent.com/Lfg237/image-retouche-photo-portrait-/main/portrait_233%20(43)_202604302111_1.jpg">
</div>
<div class="card-content">
<div class="title">Promo 43</div>
<div class="desc">Image promotionnelle</div>
<div class="price">1000 FCFA</div>
<button class="download" onclick="downloadImg(43,'https://raw.githubusercontent.com/Lfg237/image-retouche-photo-portrait-/main/portrait_233%20(43)_202604302111_1.jpg')">Télécharger</button>
<button class="wa" onclick="whatsapp(43)">WhatsApp</button>
</div>
</div>

</div>
</div>

<!-- ================= SOLDES ================= -->
<div class="section">
<h2>💸 Soldes</h2>
<div class="carousel">

<div class="card">
<div class="img-box">
<img src="https://raw.githubusercontent.com/Lfg237/image-retouche-photo-portrait-/main/portrait_233%20(61)_202605010818_1.jpg">
</div>
<div class="card-content">
<div class="title">Solde 61</div>
<div class="desc">Dernière chance</div>
<div class="price">1000 FCFA</div>
<button class="download" onclick="downloadImg(61,'https://raw.githubusercontent.com/Lfg237/image-retouche-photo-portrait-/main/portrait_233%20(61)_202605010818_1.jpg')">Télécharger</button>
<button class="wa" onclick="whatsapp(61)">WhatsApp</button>
</div>
</div>

</div>
</div>

<script>

function whatsapp(id){
let msg=`🛒 COMMANDE PRODUIT

📌 Produit: Image ${id}
📞 WhatsApp: +237670035609`;

window.open("https://wa.me/237670035609?text="+encodeURIComponent(msg),"_blank");
}

function downloadImg(id,url){

// POPUP DE PAIEMENT
let popup = document.createElement("div");
popup.style = `
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.85);
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
`;

popup.innerHTML = `
<div style="
background:#121a2b;
padding:20px;
border-radius:10px;
width:90%;
max-width:300px;
text-align:center;
color:white;
">

<h3>🔐 Téléchargement sécurisé</h3>

<p style="font-size:13px;line-height:1.4;">
Pour télécharger cette image,<br>
💰 payez <b>1000 XAF</b><br>
via WhatsApp :
<br><b>+237670035609</b>
</p>

<button onclick="window.open('https://wa.me/237670035609','_blank')" 
style="background:#25D366;color:white;width:100%;padding:6px;margin-top:10px;border:none;border-radius:5px;">
📲 Payer sur WhatsApp
</button>

<button onclick="this.parentNode.parentNode.remove()" 
style="background:#555;color:white;width:100%;padding:6px;margin-top:5px;border:none;border-radius:5px;">
⬅ Retour
</button>

</div>
`;

document.body.appendChild(popup);
}

function updateTime(){
document.getElementById("time").innerText=new Date().toLocaleTimeString();
}
setInterval(updateTime,1000);
updateTime();

</script>

</body>
</html>
