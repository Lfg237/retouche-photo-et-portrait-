<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boutique E-commerce Pro</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial,sans-serif;
background:url("https://raw.githubusercontent.com/Lfg237/image-retouche-photo-portrait-/main/portrait_233%20(62)_202605010818_1%20(1).jpg") no-repeat center center fixed;
background-size:cover;
color:white;
}

body::before{
content:"";
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.55);
z-index:-1;
}

header{
position:sticky;
top:0;
background:rgba(10,15,26,0.85);
display:flex;
justify-content:space-between;
padding:10px;
z-index:1000;
}

.section{padding:15px;}

.carousel{
display:flex;
overflow-x:auto;
gap:12px;
}

.card{
min-width:180px;
max-width:180px;
background:rgba(18,26,43,0.85);
border-radius:10px;
overflow:hidden;
}

.img-box{
width:100%;
height:260px;
display:flex;
align-items:center;
justify-content:center;
}

.img-box img{
max-width:100%;
max-height:100%;
object-fit:contain;
}

.card-content{padding:8px;}

.title{font-size:13px;font-weight:bold;}
.desc{font-size:11px;opacity:0.85;}
.price{color:#22c55e;font-weight:bold;}

button{
width:100%;
padding:6px;
margin-top:4px;
border:none;
border-radius:6px;
cursor:pointer;
}

.download{background:#3b82f6;color:white;}
.wa{background:#25D366;color:white;}

#downloadPopup{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
z-index:9999;
align-items:center;
justify-content:center;
}

.popup{
background:linear-gradient(135deg,#6a11cb,#2575fc);
padding:20px;
border-radius:15px;
width:85%;
max-width:320px;
text-align:center;
}
</style>
</head>

<header>
<div>☰</div>
<div>VENTE DES PORTRAITS & PHOTO</div>
<div></div>
</header>

<!-- ================= POPUP ================= -->
<div id="downloadPopup">
  <div class="popup">

    <h3>⬇️ Téléchargement sécurisé</h3>

    <input id="codeInput" placeholder="Code xID" style="width:100%;padding:10px;text-align:center;border:none;border-radius:8px;">

    <button id="btnDownload" class="download">Télécharger</button>
    <button onclick="closePopup()" style="background:red;color:white;width:100%;margin-top:8px;">Fermer</button>

    <p id="errorMsg"></p>

  </div>
</div>

<script>

let currentUrl="";
let currentId="";

function openDownload(id,url){
  currentId=id;
  currentUrl=url;
  document.getElementById("downloadPopup").style.display="flex";
}

function closePopup(){
  document.getElementById("downloadPopup").style.display="none";
}

document.getElementById("btnDownload").onclick=function(){

  let code=document.getElementById("codeInput").value;

  if(code==="x"+currentId){

    let a=document.createElement("a");
    a.href=currentUrl;
    a.download="image_"+currentId+".jpg";
    a.click();

    closePopup();

  }else{
    document.getElementById("errorMsg").innerText="❌ Code incorrect";
  }
};

function whatsapp(id,price,title){

  const phone="237670035609";

  const msg=`🖼️ Produit: ${title}
🆔 ID: ${id}
💰 Prix: ${price} FCFA`;

  window.open("https://wa.me/"+phone+"?text="+encodeURIComponent(msg));
}

</script>

</body>
</html>
