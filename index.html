<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial,sans-serif;
background:url("https://raw.githubusercontent.com/Lfg237/image-retouche-photo-portrait-/main/portrait_233%20(62)_202605010818_1%20(1).jpg") no-repeat center center fixed;
background-size:cover;
color:white;
}

body::before{
content:"";
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.55);
z-index:-1;
}

header{
position:sticky;
top:0;
background:rgba(10,15,26,0.85);
display:flex;
justify-content:space-between;
padding:10px;
z-index:1000;
}

.section{padding:15px;}

.carousel{
display:flex;
overflow-x:auto;
gap:12px;
}

.card{
min-width:180px;
max-width:180px;
background:rgba(18,26,43,0.85);
border-radius:10px;
overflow:hidden;
}

.img-box{
width:100%;
height:260px;
display:flex;
align-items:center;
justify-content:center;
}

.img-box img{
max-width:100%;
max-height:100%;
object-fit:contain;
}

.card-content{padding:8px;}

.title{font-size:13px;font-weight:bold;}
.desc{font-size:11px;opacity:0.85;}
.price{color:#22c55e;font-weight:bold;}

button{
width:100%;
padding:6px;
margin-top:4px;
border:none;
border-radius:6px;
cursor:pointer;
}

.download{background:#3b82f6;color:white;}
.wa{background:#25D366;color:white;}

/* POPUP */
#downloadPopup{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
z-index:9999;
align-items:center;
justify-content:center;
}

.popup{
background:linear-gradient(135deg,#6a11cb,#2575fc);
padding:20px;
border-radius:15px;
width:85%;
max-width:320px;
text-align:center;

.popup button{
margin-top:10px;
}
</style>
</head>

<!-- ================= POPUP DOWNLOAD ================= -->
<div id="downloadPopup">
  <div class="popup">
    <h3>⬇️ Téléchargement sécurisé</h3>

    <p style="font-size:13px; opacity:0.9;">
      Entre le code d’accès pour télécharger
    </p>

    <input id="codeInput" type="text"
      placeholder="Code d'accès"
      style="width:100%;padding:10px;margin-top:10px;border-radius:8px;border:none;text-align:center;font-weight:bold;">

    <button id="btnDownload" class="download">Télécharger</button>

    <!-- 🔥 NOUVEAU BOUTON WHATSAPP -->
    <button id="btnWhatsappPopup"
      style="background:#25D366;color:white;width:100%;margin-top:8px;">
      WhatsApp Support
    </button>

    <button onclick="closePopup()"
      style="background:#ff1744;color:white;width:100%;margin-top:8px;">
      Retour
    </button>

    <p id="errorMsg" style="color:#ffcccc;font-size:12px;margin-top:8px;"></p>
  </div>
</div>

<script>

let currentUrl = "";
let currentId = "";

function openDownload(id, url){
  currentUrl = url;
  currentId = id;

  document.getElementById("codeInput").value = "";
  document.getElementById("errorMsg").innerText = "";
  document.getElementById("downloadPopup").style.display = "flex";
}

function downloadImage(){

  const userCode = document.getElementById("codeInput").value.trim();
  const realCode = "x" + currentId;

  if(userCode === realCode){

    const a = document.createElement("a");
    a.href = currentUrl;
    a.download = "image_" + currentId + ".jpg";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    closePopup();

  } else {
    document.getElementById("errorMsg").innerText = "❌ Code incorrect !";
  }
}

function closePopup(){
  document.getElementById("downloadPopup").style.display = "none";
}

/* ================= CLOSE POPUP ================= */
function closePopup(){
  document.getElementById("downloadPopup").style.display = "none";
}

/* ================= DOWNLOAD ================= */
document.addEventListener("DOMContentLoaded", function(){

  document.getElementById("btnDownload").onclick = function(){

    const userCode = document.getElementById("codeInput").value.trim();
    const realCode = "x" + currentId;

    if(userCode === realCode){

      const a = document.createElement("a");
      a.href = currentUrl;
      a.download = "image_" + realCode + ".jpg";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);

      closePopup();

    } else {
      document.getElementById("errorMsg").innerText = "❌ Code incorrect !";
    }
  };

});


function whatsapp(id, price = 1000, title = "Portrait") {

  const phone = "237670035609";

  const siteLink = "https://retouche-photo-et-portrait.vercel.app/";

  const message =
`🖼️ *Commande Produit*

📌 Produit : ${title}
🆔 Numéro Image : ${id}
💰 Prix : ${price} FCFA

🌐 Site :
${siteLink}

📝 Message :
Je suis intéressé par ce portrait et je souhaite le commander.`;

  const url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(message);

  window.open(url, "_blank");
} 
</script>
